<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Homuth Learning Hub</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --green: #4ecca3;
    --yellow: #f0c040;
    --text: #eee;
    --text-dim: #aaa;
    --logan: #4fc3f7;
    --cole: #81c784;
    --mackenzie: #f48fb1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Top Bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--card);
    border-bottom: 2px solid var(--accent);
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-bar h1 { font-size: 1.2rem; white-space: nowrap; }
  .child-tabs {
    display: flex;
    gap: 6px;
  }
  .child-tab {
    padding: 8px 18px;
    border: 2px solid transparent;
    border-radius: 20px;
    background: var(--accent);
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
    appearance: none;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .child-tab:hover { opacity: 0.85; }
  .child-tab.active-logan { border-color: var(--logan); background: rgba(79,195,247,0.2); }
  .child-tab.active-cole { border-color: var(--cole); background: rgba(129,199,132,0.2); }
  .child-tab.active-mackenzie { border-color: var(--mackenzie); background: rgba(244,143,177,0.2); }

  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
  }
  .mode-toggle label { cursor: pointer; }
  .toggle-switch {
    position: relative;
    width: 52px;
    height: 28px;
    background: var(--green);
    border-radius: 28px;
    cursor: pointer;
    transition: 0.3s;
    border: none;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-switch.on {
    background: var(--highlight);
  }
  .toggle-knob {
    position: absolute;
    width: 22px; height: 22px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle-switch.on .toggle-knob {
    transform: translateX(24px);
  }

  /* ── Screens ── */
  .screen { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ── Home Screen ── */
  .home-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }
  .home-card {
    background: var(--card);
    border-radius: 16px;
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 2px solid transparent;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }
  .home-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .home-card.logan { border-color: var(--logan); }
  .home-card.cole { border-color: var(--cole); }
  .home-card.mackenzie { border-color: var(--mackenzie); }
  .home-card .emoji { font-size: 3rem; margin-bottom: 10px; }
  .home-card .name { font-size: 1.4rem; font-weight: 700; }
  .home-card .info { color: var(--text-dim); margin-top: 6px; font-size: 0.9rem; }

  /* ── Subject Selection ── */
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }
  .subject-btn {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .subject-btn:hover { border-color: var(--highlight); background: rgba(233,69,96,0.1); }
  .subject-btn .subj-icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }

  /* ── Quiz Screen ── */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .quiz-meta { font-size: 0.85rem; color: var(--text-dim); }
  .question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 40px 30px;
    text-align: center;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .question-text {
    font-size: 1.8rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 20px;
  }
  .answer-text {
    font-size: 1.4rem;
    color: var(--green);
    font-weight: 600;
    margin: 16px 0;
    padding: 12px 24px;
    background: rgba(78,204,163,0.1);
    border-radius: 10px;
    border: 1px solid var(--green);
  }
  .quiz-buttons {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: #fff;
  }
  .btn:hover { transform: scale(1.03); }
  .btn:active { transform: scale(0.97); }
  .btn-show { background: var(--accent); border: 2px solid var(--highlight); }
  .btn-correct { background: #2e7d32; }
  .btn-difficulty { background: #e65100; }
  .btn-incorrect { background: #c62828; }
  .btn-finish { background: var(--highlight); }
  .btn-next { background: var(--accent); }
  .btn-back { background: var(--accent); }
  .btn-primary { background: var(--highlight); }

  /* ── Report Screen ── */
  .report {
    background: var(--card);
    border-radius: 16px;
    padding: 30px;
    margin-top: 16px;
  }
  .report h2 { margin-bottom: 16px; color: var(--highlight); }
  .report h3 { margin: 16px 0 8px; }
  .report-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0 20px;
  }
  .report-table th, .report-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--accent);
  }
  .report-table th { color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; }
  .stat-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  .stat-box {
    background: var(--accent);
    border-radius: 10px;
    padding: 16px 20px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-box .stat-val { font-size: 1.8rem; font-weight: 700; }
  .stat-box .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
  .grade-bar {
    height: 20px;
    background: var(--accent);
    border-radius: 10px;
    overflow: hidden;
    margin: 4px 0;
  }
  .grade-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.5s;
  }

  /* ── Word Entry ── */
  .word-entry-form {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }
  .word-entry-form input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--accent);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
  }
  .word-entry-form input:focus {
    outline: none;
    border-color: var(--highlight);
  }
  .word-list {
    margin-top: 16px;
  }
  .word-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    border-radius: 20px;
    padding: 6px 14px;
    margin: 4px;
    font-size: 0.95rem;
  }
  .word-chip .remove-word {
    cursor: pointer;
    color: var(--highlight);
    font-weight: 700;
    font-size: 1.1rem;
    line-height: 1;
  }
  .word-chip .remove-word:hover { color: #ff6b6b; }

  /* ── Feature Toggles Bar ── */
  .feature-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 6px 20px;
    background: rgba(15,52,96,0.5);
    border-bottom: 1px solid var(--accent);
    flex-wrap: wrap;
  }
  .feature-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .feature-toggle label { cursor: pointer; white-space: nowrap; }
  .feat-btn {
    position: relative;
    width: 36px;
    height: 20px;
    background: var(--accent);
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid var(--text-dim);
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    -webkit-tap-highlight-color: transparent;
    transition: 0.3s;
  }
  .feat-btn.on {
    background: var(--green);
    border-color: var(--green);
  }
  .feat-knob {
    position: absolute;
    width: 14px; height: 14px;
    left: 2px; top: 2px;
    background: #fff;
    border-radius: 50%;
    transition: 0.3s;
  }
  .feat-btn.on .feat-knob {
    transform: translateX(16px);
  }

  /* ── Streak ── */
  .streak-display {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--yellow);
    min-height: 24px;
    margin-bottom: 4px;
  }

  /* ── Timer ── */
  .timer-display {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 8px;
    min-height: 36px;
  }
  .timer-display.warning { color: var(--yellow); }
  .timer-display.danger { color: var(--highlight); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  /* ── Voice Recognition ── */
  .voice-status {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-dim);
    min-height: 20px;
    margin-top: 8px;
  }
  .voice-status.listening { color: var(--highlight); }

  /* ── Misc ── */
  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .section-sub { color: var(--text-dim); font-size: 0.9rem; }
  .mt-20 { margin-top: 20px; }

  @media (max-width: 600px) {
    .question-text { font-size: 1.3rem; }
    .btn { padding: 12px 18px; font-size: 1rem; }
    .top-bar h1 { font-size: 1rem; }
    .feature-bar { gap: 8px; padding: 6px 10px; }
    .feature-toggle { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="top-bar" id="topBar">
  <h1>Homuth Learning Hub <span style="font-size:0.55rem;color:var(--text-dim);font-weight:400;">v1.7</span></h1>
  <div class="child-tabs" id="childTabs"></div>
  <div class="mode-toggle">
    <label>Focused</label>
    <button type="button" class="toggle-switch" id="modeToggle" ontouchend="event.preventDefault(); toggleMode();" onclick="toggleMode();">
      <div class="toggle-knob"></div>
    </button>
    <label>Distracted</label>
  </div>
</div>

<!-- ── Feature Toggles ── -->
<div class="feature-bar">
  <div class="feature-toggle">
    <label>🔊 TTS</label>
    <button type="button" class="feat-btn" id="ttsToggle" ontouchend="event.preventDefault(); toggleFeature('tts');" onclick="toggleFeature('tts');">
      <div class="feat-knob"></div>
    </button>
  </div>
  <div class="feature-toggle">
    <label>🎤 Voice</label>
    <button type="button" class="feat-btn" id="voiceToggle" ontouchend="event.preventDefault(); toggleFeature('voice');" onclick="toggleFeature('voice');">
      <div class="feat-knob"></div>
    </button>
  </div>
  <div class="feature-toggle">
    <label>⏱ Timer</label>
    <button type="button" class="feat-btn" id="timerToggle" ontouchend="event.preventDefault(); toggleFeature('timer');" onclick="toggleFeature('timer');">
      <div class="feat-knob"></div>
    </button>
  </div>
</div>

<!-- ── Home Screen ── -->
<div class="screen active" id="homeScreen">
  <div style="text-align:center; margin-top: 40px;">
    <h2>Who's learning today?</h2>
    <p class="section-sub">Pick a learner to get started</p>
  </div>
  <div class="home-cards" id="homeCards"></div>
  <div style="text-align:center;margin-top:30px;">
    <button onclick="exportProgress()" style="font-size:0.7rem;padding:6px 12px;background:var(--accent);color:var(--text-dim);border:1px solid var(--text-dim);border-radius:6px;cursor:pointer;margin:4px;">📤 Backup Progress</button>
    <button onclick="document.getElementById('importFile').click()" style="font-size:0.7rem;padding:6px 12px;background:var(--accent);color:var(--text-dim);border:1px solid var(--text-dim);border-radius:6px;cursor:pointer;margin:4px;">📥 Restore Progress</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
  </div>
</div>

<!-- ── Subject Screen ── -->
<div class="screen" id="subjectScreen">
  <div>
    <p class="section-sub" id="subjectWho"></p>
    <h2 class="section-title">Choose a Subject</h2>
  </div>
  <div class="subject-grid" id="subjectGrid"></div>
  <div class="mt-20" style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn btn-back" onclick="showScreen('home')">Back</button>
    <button class="btn btn-primary" onclick="showScreen('wordEntry')">✏️ Word Entry</button>
  </div>
</div>

<!-- ── Word Entry Screen ── -->
<div class="screen" id="wordEntryScreen">
  <div>
    <p class="section-sub" id="wordEntryWho"></p>
    <h2 class="section-title">Word Entry</h2>
    <p class="section-sub">Add words for English practice. These will appear as spelling questions.</p>
  </div>
  <div class="word-entry-form">
    <input type="text" id="wordInput" placeholder="Type a word and press Enter or Add" autocomplete="off">
    <button class="btn btn-primary" id="addWordBtn" onclick="addWord()">Add</button>
  </div>
  <div class="word-list" id="wordList"></div>
  <div class="mt-20">
    <button class="btn btn-back" onclick="showScreen('subject')">Back to Subjects</button>
  </div>
</div>

<!-- ── Quiz Screen ── -->
<div class="screen" id="quizScreen">
  <div class="quiz-header">
    <div>
      <span class="quiz-meta" id="quizInfo"></span>
    </div>
    <div>
      <button class="btn btn-finish" onclick="finishQuiz()">Finish Program</button>
    </div>
  </div>
  <div class="streak-display" id="streakDisplay"></div>
  <div class="timer-display" id="timerDisplay"></div>
  <div class="question-card" id="questionCard">
    <div class="question-text" id="questionText"></div>
    <div class="answer-text" id="answerText" style="display:none"></div>
    <div class="quiz-buttons" id="quizButtons"></div>
    <div class="voice-status" id="voiceStatus"></div>
  </div>
</div>

<!-- ── Report Screen ── -->
<div class="screen" id="reportScreen">
  <button class="btn btn-back" onclick="showScreen('subject')">Back to Subjects</button>
  <div class="report" id="reportContent"></div>
  <div class="mt-20">
    <button class="btn btn-primary" onclick="showScreen('subject')">Continue Learning</button>
    <button class="btn btn-back" onclick="showScreen('home')">Switch Learner</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  DATA & STATE
// ═══════════════════════════════════════════

const CHILDREN = {
  logan:     { name: 'Logan',     grade: 4, emoji: '🏒', color: 'logan',     info: 'Grade 4', startDecile: { math: 50, english: 50, science: 45 } },
  cole:      { name: 'Cole',      grade: 1, emoji: '🏒', color: 'cole',      info: 'Grade 1 · Reading Focus', startDecile: { math: 15, english: 15, science: 15 } },
  mackenzie: { name: 'Mackenzie', grade: 0, emoji: '🌟', color: 'mackenzie', info: 'JK in September', startDecile: { math: 5, english: 5, science: 5 } }
};

const SUBJECTS = [
  { id: 'all',     name: 'All Subjects', icon: '🎯' },
  { id: 'math',    name: 'Math',    icon: '🔢' },
  { id: 'english', name: 'English', icon: '📖' },
  { id: 'science', name: 'Science', icon: '🔬' },
  { id: 'wordStudy', name: 'Word Study', icon: '✏️' },
  { id: 'newWords',  name: 'New Words',  icon: '📚' }
];

// Difficulty level: 0-59 where level = grade*10 + decile
// Grade 0 = JK/SK, Grade 1-5

let state = {
  activeChild: null,
  distracted: false,
  tts: false,
  voice: false,
  timer: false,
  sessions: {} // keyed by childId, stores per-child progress
};

let quizState = null; // current quiz session
let streak = 0;
let bestStreak = 0;
let timerInterval = null;
let timerSeconds = 0;
const TIMER_DURATION = { focused: 30, distracted: 45 }; // seconds per question

function getSession(childId) {
  if (!state.sessions[childId]) {
    const child = CHILDREN[childId];
    state.sessions[childId] = {
      levels: {
        math: child.startDecile.math,
        english: child.startDecile.english,
        science: child.startDecile.science,
        newWords: child.startDecile.english
      },
      history: {} // keyed by subject, array of question results
    };
    // Ensure newWords exists on older sessions
    if (!state.sessions[childId].levels.newWords) {
      state.sessions[childId].levels.newWords = state.sessions[childId].levels.english;
    }
  }
  return state.sessions[childId];
}

function saveState() {
  try {
    const data = JSON.stringify(state);
    localStorage.setItem('homuth_learning', data);
    // Auto-backup: save a second copy with timestamp
    localStorage.setItem('homuth_learning_backup', data);
    localStorage.setItem('homuth_learning_backup_time', new Date().toISOString());
  } catch(e) {}
}

function loadState() {
  try {
    let s = localStorage.getItem('homuth_learning');
    // Fall back to backup if primary is missing
    if (!s) s = localStorage.getItem('homuth_learning_backup');
    if (s) {
      const parsed = JSON.parse(s);
      state.sessions = parsed.sessions || {};
      if (parsed.tts !== undefined) state.tts = parsed.tts;
      if (parsed.voice !== undefined) state.voice = parsed.voice;
      if (parsed.timer !== undefined) state.timer = parsed.timer;
      if (parsed.distracted !== undefined) state.distracted = parsed.distracted;
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
//  QUESTION GENERATORS
// ═══════════════════════════════════════════

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = randInt(0, i); [a[i], a[j]] = [a[j], a[i]]; } return a; }

// ── MATH ──

function genMath(level, distracted) {
  const grade = Math.floor(level / 10);
  const decile = level % 10;

  if (grade <= 0) return genMathK(decile, distracted);
  if (grade === 1) return genMath1(decile, distracted);
  if (grade === 2) return genMath2(decile, distracted);
  if (grade === 3) return genMath3(decile, distracted);
  if (grade === 4) return genMath4(decile, distracted);
  return genMath5(decile, distracted);
}

// Distracted math = mental math only: small numbers, single-step, no need for paper
function genMathK(d, dist) {
  if (d < 3) {
    const n = randInt(1, 5);
    return { q: `What comes after ${n}?`, a: `${n + 1}` };
  }
  if (d < 6) {
    const a = randInt(1, 3), b = randInt(1, 3);
    return { q: `What is ${a} plus ${b}?`, a: `${a + b}` };
  }
  const a = randInt(1, 5), b = randInt(1, 5);
  return { q: `What is ${a} plus ${b}?`, a: `${a + b}` };
}

function genMath1(d, dist) {
  if (dist) {
    // Mental math: simple addition/subtraction within 20
    return pick([
      (() => { const a=randInt(1,9),b=randInt(1,9); return { q:`What is ${a} plus ${b}?`, a:`${a+b}` }; })(),
      (() => { const a=randInt(5,15),b=randInt(1,a); return { q:`What is ${a} minus ${b}?`, a:`${a-b}` }; })(),
      (() => { const n=randInt(2,10); return { q:`What is double ${n}?`, a:`${n*2}` }; })()
    ]);
  }
  if (d < 3) {
    const a = randInt(1, 8), b = randInt(1, 8);
    return { q: `${a} + ${b} = ?`, a: `${a + b}` };
  }
  if (d < 6) {
    const a = randInt(5, 15), b = randInt(1, a);
    return pick([
      { q: `${a} - ${b} = ?`, a: `${a - b}` },
      { q: `${a} + ${b} = ?`, a: `${a + b}` }
    ]);
  }
  const a = randInt(8, 18), b = randInt(1, a);
  return pick([
    { q: `${a} - ${b} = ?`, a: `${a - b}` },
    (() => { const x=randInt(2,9),y=randInt(2,9),z=randInt(1,5); return { q:`${x} + ${y} + ${z} = ?`, a:`${x+y+z}` }; })()
  ]);
}

function genEnglish(level, distracted) {
  const grade = Math.floor(level / 10);
  const decile = level % 10;

  // Mix in custom words (~30% chance if any exist)
  const customWords = state.activeChild ? getCustomWords(state.activeChild) : [];
  if (customWords.length > 0 && Math.random() < 0.3) {
    const w = pick(customWords);
    if (distracted) {
      return { q: `Spell the word "${w}"`, a: w.toUpperCase() };
    } else {
      return { q: `Spell the word: "${w}"`, a: w.toUpperCase() };
    }
  }

  // DISTRACTED MODE: audio-friendly + occasional "look at screen" reading words
  if (distracted) {
    // ~20% chance of a "read this word" question (requires brief screen glance)
    if (Math.random() < 0.2) {
      let wordPool;
      if (grade <= 0) wordPool = SIGHT_WORDS_K;
      else if (grade === 1) wordPool = SIGHT_WORDS_1;
      else if (grade === 2) wordPool = SPELLING_2;
      else if (grade <= 4) wordPool = SPELLING_3;
      else wordPool = SPELLING_4;
      const w = pick(wordPool);
      return { q: `Look at the screen — read this word: ${w.toUpperCase()}`, a: w };
    }
    if (grade <= 0) return pick(AUDIO_ENGLISH_K);
    if (grade === 1) return pick(AUDIO_ENGLISH_1);
    if (grade === 2) return pick(AUDIO_ENGLISH_2);
    if (grade <= 4) return pick(AUDIO_ENGLISH_34);
    return pick(AUDIO_ENGLISH_5);
  }

  // FOCUSED MODE: full range including spelling, fix-the-sentence, etc.
  if (grade <= 0) {
    return pick([
      (() => { const l = String.fromCharCode(65 + randInt(0,25)); return { q:`What letter comes after ${l}?`, a: l==='Z' ? 'A (back to start!)' : String.fromCharCode(l.charCodeAt(0)+1) }; })(),
      (() => { const w = pick(SIGHT_WORDS_K); return { q:`Spell the word: "${w}"`, a: w.split('').join(' - ').toUpperCase() }; })(),
      (() => { const w = pick(SIGHT_WORDS_K); return { q:`What sound does "${w}" start with?`, a: `The "${w[0].toUpperCase()}" sound` }; })()
    ]);
  }

  let pool = [];

  if (grade === 1) {
    const w = pick(SIGHT_WORDS_1);
    pool.push({ q:`Spell the word: "${w}"`, a: w.toUpperCase() });
    pool.push(...GRAMMAR_FIX[1]);
  } else if (grade === 2) {
    const w = pick(decile < 5 ? SIGHT_WORDS_1 : SPELLING_2);
    pool.push({ q:`Spell the word: "${w}"`, a: w.toUpperCase() });
    pool.push(...(GRAMMAR_FIX[2] || GRAMMAR_FIX[1]));
  } else if (grade === 3) {
    const w = pick(decile < 5 ? SPELLING_2 : SPELLING_3);
    pool.push({ q:`Spell the word: "${w}"`, a: w.toUpperCase() });
    const v = pick(VOCAB_3);
    pool.push({ q:`What does "${v.w}" mean?`, a: v.d });
    pool.push({ q:`Use "${v.w}" in a sentence`, a: v.s });
    pool.push(...GRAMMAR_FIX[3]);
  } else if (grade === 4) {
    const w = pick(decile < 5 ? SPELLING_3 : SPELLING_4);
    pool.push({ q:`Spell the word: "${w}"`, a: w.toUpperCase() });
    const v = pick(VOCAB_4);
    pool.push({ q:`What does "${v.w}" mean?`, a: v.d });
    pool.push({ q:`Use "${v.w}" in a sentence`, a: v.s });
    pool.push(...GRAMMAR_FIX[4]);
  } else {
    const w = pick(decile < 5 ? SPELLING_4 : SPELLING_5);
    pool.push({ q:`Spell the word: "${w}"`, a: w.toUpperCase() });
    const v = pick(VOCAB_5);
    pool.push({ q:`What does "${v.w}" mean?`, a: v.d });
    pool.push({ q:`Use "${v.w}" in a sentence`, a: v.s });
    pool.push(...(GRAMMAR_FIX[5] || GRAMMAR_FIX[4]));
  }

  return pool.length > 0 ? pick(pool) : { q: 'Spell "cat"', a: 'C-A-T' };
}

function genScience(level, distracted) {
  const grade = Math.min(5, Math.max(0, Math.floor(level / 10)));
  const questions = SCIENCE_Q[grade] || SCIENCE_Q[0];
  let q = pick(questions);
  if (distracted && q.a.length > 60) {
    // Try to find a shorter answer for distracted mode
    const shorter = questions.filter(x => x.a.length < 40);
    if (shorter.length > 0) q = pick(shorter);
  }
  return q;
}

// ── MASTER GENERATOR ──

function generateQuestion(subject, level, distracted) {
  switch (subject) {
    case 'math': return genMath(level, distracted);
    case 'english': return genEnglish(level, distracted);
    case 'science': return genScience(level, distracted);
    default: return genMath(level, distracted);
  }
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  switch(name) {
    case 'home':
      document.getElementById('homeScreen').classList.add('active');
      break;
    case 'subject':
      document.getElementById('subjectScreen').classList.add('active');
      renderSubjectScreen();
      break;
    case 'quiz':
      document.getElementById('quizScreen').classList.add('active');
      break;
    case 'report':
      document.getElementById('reportScreen').classList.add('active');
      break;
    case 'wordEntry':
      document.getElementById('wordEntryScreen').classList.add('active');
      renderWordEntry();
      break;
  }
}

function selectChild(id) {
  state.activeChild = id;
  saveState();
  renderChildTabs();
  showScreen('subject');
}

function renderHome() {
  const container = document.getElementById('homeCards');
  container.innerHTML = '';

function renderChildTabs() {

  for (const [id, child] of Object.entries(CHILDREN)) {
    const btn = document.createElement('button');
    btn.type = 'button';

function renderSubjectScreen() {
  const child = CHILDREN[state.activeChild];
  document.getElementById('subjectWho').textContent = `${child.emoji} ${child.name} — ${child.info}`;
  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = '';
  const session = getSession(state.activeChild);

  // No science for Cole or Mackenzie
  const noScience = (state.activeChild === 'cole' || state.activeChild === 'mackenzie');
  const availableSubjects = noScience ? SUBJECTS.filter(s => s.id !== 'science') : SUBJECTS;

  for (const subj of availableSubjects) {

      `;

      const wordCount = getCustomWords(state.activeChild).length;
      const modeDesc = (state.activeChild === 'cole' || state.activeChild === 'mackenzie')
        ? 'Pronounce words from your list' : 'Spell words from your list';
      btn.innerHTML = `
        <span class="subj-icon">${subj.icon}</span>
        ${subj.name}
        <div style="font-size:0.75rem;color:var(--text-dim);margin-top:4px;">${modeDesc}</div>

        ${subj.name}
        <div style="font-size:0.75rem;color:var(--text-dim);margin-top:4px;">Level: Grade ${grade}.${decile}</div>

function getCustomWords(childId) {
  try {
    const data = localStorage.getItem('homuth_words_' + childId);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function saveCustomWords(childId, words) {
  try { localStorage.setItem('homuth_words_' + childId, JSON.stringify(words)); } catch(e) {}
}

function renderWordEntry() {
  const child = CHILDREN[state.activeChild];
  document.getElementById('wordEntryWho').textContent = `${child.emoji} ${child.name} — ${child.info}`;
  const words = getCustomWords(state.activeChild);
  const container = document.getElementById('wordList');
  if (words.length === 0) {
    container.innerHTML = '<p style="color:var(--text-dim);margin-top:12px;">No custom words yet. Add some above!</p>';
  } else {
    container.innerHTML = '<p style="color:var(--text-dim);margin-bottom:8px;">' + words.length + ' word' + (words.length !== 1 ? 's' : '') + ':</p>' +
      words.map((w, i) => `<span class="word-chip">${w} <span class="remove-word" onclick="removeWord(${i})">×</span></span>`).join('');
  }
  document.getElementById('wordInput').focus();
}

function addWord() {
  const input = document.getElementById('wordInput');
  const word = input.value.trim().toLowerCase();
  if (!word) return;
  const words = getCustomWords(state.activeChild);
  if (!words.includes(word)) {
    words.push(word);
    saveCustomWords(state.activeChild, words);
  }
  input.value = '';
  input.focus();
  renderWordEntry();
}

function removeWord(index) {
  const words = getCustomWords(state.activeChild);
  words.splice(index, 1);
  saveCustomWords(state.activeChild, words);
  renderWordEntry();
}

// Enter key to add word
document.getElementById('wordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); addWord(); }
});

function removeWordFromQuiz(word) {
  const words = getCustomWords(quizState.childId);
  const idx = words.indexOf(word);
  if (idx >= 0) {
    words.splice(idx, 1);
    saveCustomWords(quizState.childId, words);
  }
  // Visual feedback
  event.target.textContent = '✓ Removed!';
  event.target.disabled = true;
  event.target.style.background = 'var(--accent)';
}

function saveQuizState() {
  if (!quizState) return;
  const session = getSession(quizState.childId);
  if (quizState.isAll) {
    for (const s of quizState.childSubjects) {
      session.levels[s] = quizState.currentLevels[s];
    }
  } else if (quizState.isNewWords) {
    session.levels.newWords = quizState.currentLevel;
  } else if (!quizState.isWordStudy) {
    session.levels[quizState.subject] = quizState.currentLevel;
    if (!session.history[quizState.subject]) session.history[quizState.subject] = [];
    session.history[quizState.subject] = quizState.results;
  }
  saveState();
}

const CORE_SUBJECTS = ['math', 'english', 'science'];

function getChildSubjects(childId) {
  if (childId === 'cole' || childId === 'mackenzie') return ['math', 'english'];
  return CORE_SUBJECTS;
}

function startQuiz(subject) {
  const childId = state.activeChild;
  const session = getSession(childId);
  // Ensure newWords level exists
  if (!session.levels.newWords) session.levels.newWords = session.levels.english;
  const isAll = subject === 'all';
  const isWordStudy = subject === 'wordStudy';
  const isNewWords = subject === 'newWords';
  const childSubjects = getChildSubjects(childId);

  // For "all" mode, we track levels per subject individually
  const startLevels = {};
  if (isAll) {
    for (const s of childSubjects) startLevels[s] = session.levels[s];
  } else if (isNewWords) {
    startLevels.newWords = session.levels.newWords;
  } else if (!isWordStudy) {
    startLevels[subject] = session.levels[subject];
  }

  const prevHistory = isAll ? [] : (session.history[subject] || []);

  quizState = {
    childId,
    subject,
    isAll,
    isWordStudy,
    isNewWords,
    currentLevels: { ...startLevels },
    currentLevel: isAll ? session.levels['math'] : (isNewWords ? session.levels.newWords : (isWordStudy ? 0 : session.levels[subject])),
    startLevels: { ...startLevels },
    startLevel: isAll ? null : (isNewWords ? session.levels.newWords : (isWordStudy ? 0 : session.levels[subject])),
    currentSubject: isAll ? childSubjects[0] : subject,
    childSubjects,
    subjectRotation: 0,
    questionNum: 0,
    results: [...prevHistory],
    sessionResults: [],
    repeatQueue: [],
    showingAnswer: false,
    currentQuestion: null,
    correctRun: 0,
    incorrectRun: 0
  };

  streak = 0;
  bestStreak = 0;

  showScreen('quiz');
  nextQuestion();
}

function nextQuestion() {
  quizState.questionNum++;
  const distracted = state.distracted;

  // Rotate subject in "all" mode
  if (quizState.isAll) {
    // Logan gets science ~15% of the time; others rotate equally
    if (quizState.childId === 'logan' && quizState.childSubjects.includes('science')) {
      const r = Math.random();
      if (r < 0.15) {
        quizState.currentSubject = 'science';
      } else if (r < 0.575) {
        quizState.currentSubject = 'math';
      } else {
        quizState.currentSubject = 'english';
      }
    } else {
      quizState.currentSubject = quizState.childSubjects[quizState.subjectRotation % quizState.childSubjects.length];
      quizState.subjectRotation++;
    }
    quizState.currentLevel = quizState.currentLevels[quizState.currentSubject];
  }

  // Check repeat queue
  let fromRepeat = false;
  const repeatIdx = quizState.repeatQueue.findIndex(r => r.repeatAtNum <= quizState.questionNum);
  let question;

  if (repeatIdx >= 0) {
    question = quizState.repeatQueue[repeatIdx].question;
    quizState.repeatQueue.splice(repeatIdx, 1);
    fromRepeat = true;
  } else if (quizState.isWordStudy) {
    question = genWordStudy(quizState.childId);
    if (!question) {
      alert('No words in your list! Add words in Word Entry first.');
      showScreen('subject');
      return;
    }
  } else if (quizState.isNewWords) {
    question = genNewWord(quizState.currentLevel);
  } else {
    question = generateQuestion(quizState.currentSubject, quizState.currentLevel, distracted);
  }

  quizState.currentQuestion = question;
  quizState.currentQuestion._fromRepeat = fromRepeat;
  quizState.currentQuestion._subject = quizState.currentSubject;
  quizState.showingAnswer = false;

  renderQuiz();
  updateStreakDisplay();

  // TTS: read the question aloud
  speak(question.q);

  // Start timer
  if (state.timer) startTimer();

  // Start voice recognition
  if (state.voice) startVoiceRecognition();
}

function renderQuiz() {
  const child = CHILDREN[quizState.childId];
  const grade = Math.floor(quizState.currentLevel / 10);
  const decile = quizState.currentLevel % 10;
  const currentSubjName = quizState.isAll
    ? SUBJECTS.find(s => s.id === quizState.currentSubject).name
    : SUBJECTS.find(s => s.id === quizState.subject).name;
  const distracted = state.distracted;

  document.getElementById('quizInfo').textContent =
    `${child.emoji} ${child.name} | ${currentSubjName} | Grade ${grade}.${decile} | Q#${quizState.questionNum} | ${distracted ? '🏃 Distracted' : '🎯 Focused'} | Repeat queue: ${quizState.repeatQueue.length}`;

  // Word Study: show large display word for Cole/Mackenzie to read
  const questionTextEl = document.getElementById('questionText');
  if (quizState.isWordStudy && quizState.currentQuestion._displayWord && !quizState.showingAnswer) {
    questionTextEl.innerHTML = quizState.currentQuestion.q + '<div style="font-size:3rem;margin-top:20px;font-weight:800;letter-spacing:4px;">' + quizState.currentQuestion._displayWord + '</div>';
  } else {
    questionTextEl.textContent = quizState.currentQuestion.q;
  }

  const answerEl = document.getElementById('answerText');
  const buttonsEl = document.getElementById('quizButtons');

  if (quizState.showingAnswer) {
    // Build answer display
    let answerHTML = quizState.currentQuestion.a;
    // New Words: show example sentence
    if (quizState.isNewWords && quizState.currentQuestion._sentence) {
      answerHTML += `<div style="font-size:0.9rem;color:var(--text-dim);margin-top:10px;font-style:italic;font-weight:400;">Example: "${quizState.currentQuestion._sentence}"</div>`;
    }
    answerEl.innerHTML = answerHTML;
    answerEl.style.display = 'block';

    // Build buttons
    let extraButtons = '';
    // Word Study: add Remove from List button
    if (quizState.isWordStudy && quizState.currentQuestion._customWord) {
      extraButtons += `<button class="btn" style="background:#7b1fa2;margin-top:8px;" onclick="removeWordFromQuiz('${quizState.currentQuestion._customWord.replace(/'/g, "\\'")}')">🗑 Remove from List</button>`;
    }

    buttonsEl.innerHTML = `
      <button class="btn btn-correct" onclick="recordAnswer('correct')">✓ Correct</button>
      <button class="btn btn-difficulty" onclick="recordAnswer('difficulty')">~ With Difficulty</button>
      <button class="btn btn-incorrect" onclick="recordAnswer('incorrect')">✗ Incorrect</button>
      <button class="btn" style="background:var(--accent);margin-top:8px;" onclick="skipQuestion()">⏭ Skip Question</button>
      ${extraButtons}
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:12px;">
        <button onclick="nudgeLevel(-1)" style="font-size:0.65rem;padding:4px 8px;background:var(--accent);color:var(--text-dim);border:1px solid var(--text-dim);border-radius:6px;cursor:pointer;">▼ decile</button>
        <button onclick="nudgeLevel(1)" style="font-size:0.65rem;padding:4px 8px;background:var(--accent);color:var(--text-dim);border:1px solid var(--text-dim);border-radius:6px;cursor:pointer;">▲ decile</button>
      </div>
    `;
  } else {
    answerEl.style.display = 'none';
    buttonsEl.innerHTML = `
      <button class="btn btn-show" onclick="showAnswer()">Show Answer</button>
      <button class="btn" style="background:var(--accent);margin-top:8px;" onclick="skipQuestion()">⏭ Skip Question</button>
    `;
  }
}

function showAnswer() {
  quizState.showingAnswer = true;
  stopTimer();
  stopVoiceRecognition();
  renderQuiz();
  // TTS: read the answer
  speak('The answer is: ' + quizState.currentQuestion.a);
}

function nudgeLevel(delta) {
  const newLevel = Math.max(0, Math.min(59, quizState.currentLevel + delta));
  quizState.currentLevel = newLevel;
  if (quizState.isAll) {
    quizState.currentLevels[quizState.currentSubject] = newLevel;
  }
  // Update the info line to reflect the change
  renderQuiz();
}

function skipQuestion() {
  // Skip without affecting difficulty or subject rotation
  stopTimer();
  stopVoiceRecognition();
  window.speechSynthesis.cancel();
  const distracted = state.distracted;
  let question;
  if (quizState.isWordStudy) {
    question = genWordStudy(quizState.childId);
    if (!question) { alert('No words left in your list!'); showScreen('subject'); return; }
  } else if (quizState.isNewWords) {
    question = genNewWord(quizState.currentLevel);
  } else {
    question = generateQuestion(quizState.currentSubject, quizState.currentLevel, distracted);
  }
  question._subject = quizState.currentSubject;
  quizState.currentQuestion = question;
  quizState.showingAnswer = false;
  quizState.questionNum++;
  renderQuiz();
  updateStreakDisplay();
  speak(question.q);
  if (state.timer) startTimer();
  if (state.voice) startVoiceRecognition();
}

function recordAnswer(result) {
  const q = quizState.currentQuestion;
  const levelBefore = quizState.currentLevel;

  // Streak tracking and sounds
  if (result === 'correct') {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    if (streak >= 5 && streak % 5 === 0) {
      playSound('streak');
      speak(`Amazing! ${streak} in a row!`);
    } else {
      playSound('correct');
    }
  } else if (result === 'incorrect') {
    if (streak >= 3) speak(`Streak ended at ${streak}`);
    streak = 0;
    playSound('incorrect');
  } else {
    // difficulty — don't break streak but don't grow it
    playSound('correct');
  }
  updateStreakDisplay();

  // Record
  const record = {
    question: q.q,
    answer: q.a,
    result,
    level: quizState.currentLevel,
    subject: quizState.currentSubject,
    timestamp: Date.now()
  };
  quizState.results.push(record);
  quizState.sessionResults.push(record);

  // Adaptive difficulty — need 3 correct to move up 1 decile, 3 incorrect to move down 1
  if (!q._fromRepeat) {
    if (result === 'correct') {
      quizState.correctRun++;
      quizState.incorrectRun = 0;
      if (quizState.correctRun >= 3) {
        quizState.currentLevel = Math.min(59, quizState.currentLevel + 1);
        quizState.correctRun = 0;
      }
    } else if (result === 'difficulty') {
      // Doesn't break correct run but doesn't add to it; resets incorrect run
      quizState.incorrectRun = 0;
    } else {
      // incorrect
      quizState.incorrectRun++;
      quizState.correctRun = 0;
      if (quizState.incorrectRun >= 3) {
        quizState.currentLevel = Math.max(0, quizState.currentLevel - 1);
        quizState.incorrectRun = 0;
      }
    }
    // Update per-subject level in "all" mode
    if (quizState.isAll) {
      quizState.currentLevels[quizState.currentSubject] = quizState.currentLevel;
    }
  }

  // Spaced repetition
  if (result === 'incorrect') {
    quizState.repeatQueue.push({ question: { q: q.q, a: q.a }, repeatAtNum: quizState.questionNum + 5 });
    quizState.repeatQueue.push({ question: { q: q.q, a: q.a }, repeatAtNum: quizState.questionNum + 15 });
  } else if (result === 'difficulty') {
    quizState.repeatQueue.push({ question: { q: q.q, a: q.a }, repeatAtNum: quizState.questionNum + 10 });
  }

  saveQuizState();
  nextQuestion();
}

function finishQuiz() {
  saveQuizState();
  stopTimer();
  stopVoiceRecognition();
  window.speechSynthesis.cancel();

  const results = quizState.sessionResults;
  const childName = CHILDREN[quizState.childId].name;
  const isAll = quizState.isAll;

  const total = results.length;
  const correct = results.filter(r => r.result === 'correct').length;
  const difficulty = results.filter(r => r.result === 'difficulty').length;
  const incorrect = results.filter(r => r.result === 'incorrect').length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  let html = `
    <h2>${childName}'s ${isAll ? 'All Subjects' : SUBJECTS.find(s => s.id === quizState.subject).name} Report</h2>

    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-val">${total}</div>
        <div class="stat-label">Questions</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--green)">${correct}</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--yellow)">${difficulty}</div>
        <div class="stat-label">With Difficulty</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--highlight)">${incorrect}</div>
        <div class="stat-label">Incorrect</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${pct}%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" style="color:var(--yellow)">🔥 ${bestStreak}</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>
  `;

  // Grade level report — per subject in "all" mode, single subject otherwise
  const subjectsToReport = isAll ? quizState.childSubjects : [quizState.subject];

  for (const subj of subjectsToReport) {
    const subjLabel = SUBJECTS.find(s => s.id === subj).name;
    const finalLevel = isAll ? quizState.currentLevels[subj] : quizState.currentLevel;
    const startLevel = isAll ? quizState.startLevels[subj] : quizState.startLevel;
    const finalGrade = Math.floor(finalLevel / 10);
    const finalDecile = finalLevel % 10;
    const startGrade = Math.floor(startLevel / 10);
    const startDecile = startLevel % 10;
    const gradeColor = finalLevel >= startLevel ? 'var(--green)' : 'var(--highlight)';
    const gradeWidth = ((finalDecile + 1) / 10) * 100;

    html += `
      <h3 style="margin-top:20px;">${subjLabel}</h3>
      <table class="report-table">
        <tr><th>Metric</th><th>Value</th></tr>
        <tr><td>Starting Level</td><td>Grade ${startGrade}, Decile ${startDecile}/10</td></tr>
        <tr><td>Final Level</td><td style="color:${gradeColor};font-weight:700">Grade ${finalGrade}, Decile ${finalDecile}/10</td></tr>
        <tr><td>Change</td><td>${finalLevel >= startLevel ? '↑' : '↓'} ${Math.abs(finalLevel - startLevel)} levels</td></tr>
      </table>
      <p style="margin-bottom:4px;font-size:0.9rem;">Grade ${finalGrade} Position (Decile ${finalDecile}/10):</p>
      <div class="grade-bar">
        <div class="grade-fill" style="width:${gradeWidth}%;background:${gradeColor}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-dim);margin-top:2px;">
        <span>Grade ${finalGrade}.0</span><span>Grade ${finalGrade}.5</span><span>Grade ${finalGrade}.9</span>
      </div>
    `;
  }

  let recentWrong = results.filter(r => r.result === 'incorrect').slice(-5);
  if (recentWrong.length > 0) {
    html += `<h3 style="margin-top:20px;">Questions to Review</h3>
    <table class="report-table">
      <tr><th>Question</th><th>Answer</th></tr>
      ${recentWrong.map(r => `<tr><td>${r.question}</td><td>${r.answer}</td></tr>`).join('')}
    </table>`;
  }

  // Level history mini-chart
  if (results.length > 1) {
    const levels = results.map(r => r.level);
    const minL = Math.min(...levels);
    const maxL = Math.max(...levels);
    html += `<h3>Difficulty Progression</h3><div style="font-family:monospace;font-size:0.8rem;color:var(--text-dim);line-height:1.6;">`;
    const step = Math.max(1, Math.floor(results.length / 20));
    for (let i = 0; i < results.length; i += step) {
      const r = results[i];
      const g = Math.floor(r.level / 10);
      const d = r.level % 10;
      const bar = '█'.repeat(Math.max(1, Math.round((r.level - minL + 1) / Math.max(1, maxL - minL + 1) * 20)));
      const color = r.result === 'correct' ? 'var(--green)' : r.result === 'difficulty' ? 'var(--yellow)' : 'var(--highlight)';
      html += `<div>Q${String(i+1).padStart(3,' ')} <span style="color:${color}">${bar}</span> G${g}.${d}</div>`;
    }
    html += `</div>`;
  }

  document.getElementById('reportContent').innerHTML = html;
  showScreen('report');
  quizState = null;
}

// ═══════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (!quizState) return;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!quizState.showingAnswer) {
      showAnswer();
    }
  } else if (quizState.showingAnswer) {
    if (e.key === '1' || e.key === 'c' || e.key === 'C') recordAnswer('correct');
    else if (e.key === '2' || e.key === 'd' || e.key === 'D') recordAnswer('difficulty');
    else if (e.key === '3' || e.key === 'i' || e.key === 'I') recordAnswer('incorrect');
  }
});

// ═══════════════════════════════════════════
//  MODE TOGGLE
// ═══════════════════════════════════════════

function toggleMode() {
  state.distracted = !state.distracted;
  updateToggleVisual();
  saveState();
}

function updateToggleVisual() {
  const el = document.getElementById('modeToggle');
  if (state.distracted) {
    el.classList.add('on');
  } else {
    el.classList.remove('on');
  }
}

// ═══════════════════════════════════════════
//  FEATURE TOGGLES (TTS, Voice, Timer)
// ═══════════════════════════════════════════

function toggleFeature(feat) {
  state[feat] = !state[feat];
  updateFeatureToggles();
  saveState();
  // Stop voice recognition if toggled off
  if (feat === 'voice' && !state.voice) stopVoiceRecognition();
  // Stop timer if toggled off
  if (feat === 'timer' && !state.timer) stopTimer();
}

function updateFeatureToggles() {
  ['tts', 'voice', 'timer'].forEach(f => {
    const el = document.getElementById(f + 'Toggle');
    if (el) {
      if (state[f]) el.classList.add('on');
      else el.classList.remove('on');
    }
  });
}

// ── Text-to-Speech ──

function speak(text) {
  if (!state.tts) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  u.pitch = 1;
  u.lang = 'en-CA';
  window.speechSynthesis.speak(u);
}

// ── Sound Effects (Web Audio API) ──

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  // Ensure AudioContext is resumed (iOS requires user gesture)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;

  if (type === 'correct') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.1);
    osc.frequency.setValueAtTime(784, now + 0.2);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.start(now);
    osc.stop(now + 0.4);
  } else if (type === 'streak') {
    // Triumphant ascending arpeggio
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now);
    osc.frequency.setValueAtTime(659, now + 0.08);
    osc.frequency.setValueAtTime(784, now + 0.16);
    osc.frequency.setValueAtTime(1047, now + 0.24);
    gain.gain.setValueAtTime(0.35, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
  } else if (type === 'incorrect') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.setValueAtTime(150, now + 0.15);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
    osc.start(now);
    osc.stop(now + 0.3);
  } else if (type === 'timerWarning') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
    osc.start(now);
    osc.stop(now + 0.15);
  } else if (type === 'timeUp') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.setValueAtTime(200, now + 0.2);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc.start(now);
    osc.stop(now + 0.4);
  }
}

function updateStreakDisplay() {
  const el = document.getElementById('streakDisplay');
  if (!el) return;
  if (streak >= 3) {
    el.textContent = `🔥 Streak: ${streak}!` + (streak >= 5 ? ' 🔥🔥' : '') + (streak >= 10 ? '🔥' : '');
    el.style.display = 'block';
  } else if (streak > 0) {
    el.textContent = `✓ ${streak} in a row`;
    el.style.display = 'block';
  } else {
    el.textContent = '';
  }
}

// ── Timer ──

function startTimer() {
  stopTimer();
  if (!state.timer) return;
  timerSeconds = state.distracted ? TIMER_DURATION.distracted : TIMER_DURATION.focused;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds === 10) playSound('timerWarning');
    if (timerSeconds === 5) playSound('timerWarning');
    if (timerSeconds <= 0) {
      playSound('timeUp');
      stopTimer();
      // Auto show answer when time is up
      if (quizState && !quizState.showingAnswer) {
        showAnswer();
      }
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  const el = document.getElementById('timerDisplay');
  if (el) { el.textContent = ''; el.className = 'timer-display'; }
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  if (!el || !state.timer) { if (el) el.textContent = ''; return; }
  el.textContent = `⏱ ${timerSeconds}s`;
  el.className = 'timer-display';
  if (timerSeconds <= 5) el.classList.add('danger');
  else if (timerSeconds <= 10) el.classList.add('warning');
}

// ── Voice Recognition ──

let recognition = null;
let voiceListening = false;

function startVoiceRecognition() {
  if (!state.voice) return;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voiceStatus').textContent = 'Voice not supported on this browser';
    return;
  }
  stopVoiceRecognition();
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-CA';

  const statusEl = document.getElementById('voiceStatus');

  recognition.onstart = () => {
    voiceListening = true;
    if (statusEl) { statusEl.textContent = '🎤 Listening...'; statusEl.className = 'voice-status listening'; }
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript.toLowerCase().trim();
    if (statusEl) statusEl.textContent = `🎤 Heard: "${transcript}"`;

    if (event.results[0].isFinal && quizState) {
      // Check if the heard answer matches
      const answer = quizState.currentQuestion.a.toLowerCase().trim();
      const heard = transcript;

      // Simple matching: check if the answer starts with what was heard, or vice versa
      const match = answer.includes(heard) || heard.includes(answer) ||
        // For numeric answers
        heard.replace(/[^0-9.-]/g, '') === answer.replace(/[^0-9.-]/g, '');

      if (statusEl) {
        statusEl.textContent = match ? `🎤 "${transcript}" ✓ Sounds right!` : `🎤 "${transcript}"`;
      }
    }
  };

  recognition.onerror = (event) => {
    voiceListening = false;
    if (event.error !== 'aborted' && event.error !== 'no-speech') {
      if (statusEl) statusEl.textContent = `🎤 ${event.error}`;
    }
  };

  recognition.onend = () => {
    voiceListening = false;
    // Auto-restart if still in quiz and voice is on
    if (state.voice && quizState && !quizState.showingAnswer) {
      setTimeout(() => { if (state.voice && quizState && !quizState.showingAnswer) startVoiceRecognition(); }, 300);
    } else {
      if (statusEl) { statusEl.textContent = ''; statusEl.className = 'voice-status'; }
    }
  };

  recognition.start();
}

function stopVoiceRecognition() {
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  voiceListening = false;
  const statusEl = document.getElementById('voiceStatus');
  if (statusEl) { statusEl.textContent = ''; statusEl.className = 'voice-status'; }
}

// ═══════════════════════════════════════════
//  PROGRESS BACKUP / RESTORE
// ═══════════════════════════════════════════

function exportProgress() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'homuth-learning-backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (parsed.sessions) {
        state.sessions = parsed.sessions;
        saveState();
        alert('Progress restored successfully!');
        location.reload();
      } else {
        alert('Invalid backup file');
      }
    } catch(err) {
      alert('Error reading backup: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

loadState();
updateToggleVisual();
updateFeatureToggles();
renderHome();
renderChildTabs();
</script>
